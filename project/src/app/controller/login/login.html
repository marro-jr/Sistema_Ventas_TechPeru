<div class="container min-vh-100 d-flex justify-content-center align-items-center">
  <div class="row w-100 justify-content-center">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">

      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

        <div class="card-header bg-dark text-white text-center py-4 border-0">
          <h4 class="mb-1 fw-bold">Iniciar Sesión</h4>
          <p class="mb-0 text-white-50 small">
            Accede al sistema de ventas
          </p>
        </div>

        <div class="card-body p-4 p-md-5">

          <div class="text-center mb-4">
            <div class="bg-dark text-white rounded-circle d-inline-flex justify-content-center align-items-center fw-bold fs-4"
                 style="width: 64px; height: 64px;">
              TP
            </div>
            <h5 class="mt-3 mb-1 fw-semibold">Technology Perú</h5>
            <p class="text-muted small mb-0">
              Ingresa tus credenciales para continuar
            </p>
          </div>

          <form>

            <div class="mb-3">
              <label for="correo" class="form-label fw-semibold">
                Correo electrónico
              </label>
              <input
                [(ngModel)]="correo"
                type="email"
                maxlength="50"
                class="form-control form-control-lg rounded-3"
                id="correo"
                name="correo"
                placeholder="ejemplo@correo.com"
                required
              >
            </div>

            <div class="mb-4">
              <label for="contrasena" class="form-label fw-semibold">
                Contraseña
              </label>
              <input
                [(ngModel)]="contrasena"
                type="password"
                maxlength="50"
                class="form-control form-control-lg rounded-3"
                id="contrasena"
                name="contrasena"
                placeholder="Ingresa tu contraseña"
                required
              >
            </div>

            <button
              type="button"
              class="btn btn-dark btn-lg w-100 rounded-3 fw-semibold shadow-sm"
              (click)="iniciarSesion()"
            >
              Iniciar Sesión
            </button>

          </form>

          <div class="text-center mt-4">
            <small class="text-muted">
              Sistema de Gestión de Ventas
            </small>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
