<div class="login-wrapper min-vh-100 d-flex justify-content-center align-items-center">
  <!-- Animated background elements -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  
  <div class="container relative-container">
    <div class="row w-100 justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
        
        <div class="glass-card shadow-2xl rounded-4 overflow-hidden fade-in-up">
          
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-5">
              <div class="logo-container mx-auto mb-3">
                <span class="logo-text fw-bold">TP</span>
              </div>
              <h4 class="fw-bold text-white mb-1">Technology Perú</h4>
              <p class="text-white-50 small mb-0">Gestión de Ventas Pro</p>
            </div>

            <!-- Error Message -->
            <div class="alert alert-danger custom-alert d-flex align-items-center mb-4" role="alert" *ngIf="mensajeError">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-exclamation-triangle-fill me-2 flex-shrink-0" viewBox="0 0 16 16">
                <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
              </svg>
              <div class="small fw-medium">{{ mensajeError }}</div>
            </div>

            <form (ngSubmit)="iniciarSesion()" #loginForm="ngForm">
              
              <div class="form-group mb-4 position-relative">
                <label for="correo" class="form-label text-white-50 small fw-semibold text-uppercase tracking-wider">
                  Correo Electrónico
                </label>
                <div class="input-container">
                  <input
                    [(ngModel)]="correo"
                    type="email"
                    maxlength="50"
                    class="custom-input form-control"
                    id="correo"
                    name="correo"
                    placeholder="tucorreo@ejemplo.com"
                    required
                    [disabled]="cargando"
                  >
                  <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope-fill" viewBox="0 0 16 16">
                      <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414.05 3.555ZM0 4.697v7.104l5.803-3.558L0 4.697ZM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586l-1.239-.757Zm3.436-.586L16 11.801V4.697l-5.803 3.546Z"/>
                    </svg>
                  </span>
                </div>
              </div>

              <div class="form-group mb-5 position-relative">
                <div class="d-flex justify-content-between align-items-end">
                  <label for="contrasena" class="form-label text-white-50 small fw-semibold text-uppercase tracking-wider">
                    Contraseña
                  </label>
                  <a href="#" class="text-accent small text-decoration-none fw-medium mb-2" (click)="$event.preventDefault()">¿Olvidaste tu contraseña?</a>
                </div>
                <div class="input-container">
                  <input
                    [(ngModel)]="contrasena"
                    [type]="contrasenaVisible ? 'text' : 'password'"
                    maxlength="50"
                    class="custom-input form-control pe-5"
                    id="contrasena"
                    name="contrasena"
                    placeholder="••••••••"
                    required
                    [disabled]="cargando"
                  >
                  <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lock-fill" viewBox="0 0 16 16">
                      <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                    </svg>
                  </span>
                  <button type="button" class="btn border-0 position-absolute end-0 top-50 translate-middle-y text-white-50 px-3 hover-text-white transition-all" (click)="togglePasswordVisibility()" tabindex="-1">
                    <svg *ngIf="!contrasenaVisible" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16">
                      <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                      <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
                    </svg>
                    <svg *ngIf="contrasenaVisible" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-slash-fill" viewBox="0 0 16 16">
                      <path d="M10.79 12.912l-1.614-1.615a3.5 3.5 0 0 1-4.474-4.474l-2.06-2.06C.938 6.278 0 8 0 8s3 5.5 8 5.5a7.029 7.029 0 0 0 2.79-.588zM5.21 3.088A7.028 7.028 0 0 1 8 2.5c5 0 8 5.5 8 5.5s-.939 1.721-2.641 3.238l-2.062-2.062a3.5 3.5 0 0 0-4.474-4.474L5.21 3.089z"/>
                      <path d="M5.525 7.646a2.5 2.5 0 0 0 2.829 2.829l-2.83-2.829zm4.95.708l-2.829-2.83a2.5 2.5 0 0 1 2.829 2.829zm3.171 6l-12-12 .708-.708 12 12-.708.708z"/>
                    </svg>
                  </button>
                </div>
              </div>

              <button
                type="submit"
                class="btn custom-btn w-100 fw-bold shadow position-relative overflow-hidden"
                [disabled]="cargando || !correo || !contrasena"
              >
                <span class="btn-text d-flex align-items-center justify-content-center" [class.invisible]="cargando">
                  Ingresar al Sistema
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-right ms-2 transition-transform" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/>
                  </svg>
                </span>
                
                <!-- Spinner -->
                <div class="spinner-overlay d-flex justify-content-center align-items-center position-absolute top-0 start-0 w-100 h-100" *ngIf="cargando">
                  <div class="custom-spinner spinner-border text-white" role="status">
                    <span class="visually-hidden">Cargando...</span>
                  </div>
                </div>
              </button>

            </form>

          </div>
        </div>
        
        <div class="text-center mt-4">
          <p class="text-white-50 small mb-0 font-monospace">© 2024 Technology Perú. V 1.0.0</p>
        </div>

      </div>
    </div>
  </div>
</div>
